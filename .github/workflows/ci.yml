name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout web client
        uses: actions/checkout@v4

      - name: Checkout protocol fixtures
        uses: actions/checkout@v4
        with:
          repository: magicvr/schema-ui-docs
          ref: 152501fb1b8cade02f2780d96a82b5ceb2f5d281
          path: schema-ui-docs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test protocol conformance
        env:
          SCHEMA_UI_FIXTURES: ${{ github.workspace }}/schema-ui-docs/conformance/fixtures
        run: npm test

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint